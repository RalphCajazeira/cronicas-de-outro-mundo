projects:
  - name: Game-GPT
    environments:
      - name: Staging
        services:
          - type: web
            runtime: node
            name: cronicas-de-outro-mundo-staging-api
            repo: https://github.com/RalphCajazeira/cronicas-de-outro-mundo
            branch: develop
            plan: free
            region: virginia
            buildCommand: npm ci --prefix backend && npm run prisma:generate && npm run build
            startCommand: npm start
            healthCheckPath: /health/ready
            autoDeployTrigger: "off"
            maxShutdownDelaySeconds: 30
            envVars:
              - key: NODE_ENV
                value: production
              - key: HOST
                value: 0.0.0.0
              - key: NODE_EXTRA_CA_CERTS
                value: /etc/secrets/supabase-ca.crt
              - key: DATABASE_URL
                sync: false
              - key: RPG_API_KEY
                sync: false
              - key: PUBLIC_BASE_URL
                sync: false
